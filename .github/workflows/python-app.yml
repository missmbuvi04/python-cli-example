name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest black
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with Black
      run: |
        black --check . || echo "Code needs formatting! Run 'black .' locally to fix."
    
    - name: Test with pytest
      run: |
        # Check if any test files exist
        if ls test_*.py *_test.py 2>/dev/null 1>&2; then
          pytest -v
        else
          echo " No test files found. To add tests, create files named test_*.py or *_test.py"
          echo " This step is marked as successful but no tests ran."
        fi
