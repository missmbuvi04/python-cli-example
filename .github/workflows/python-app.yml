name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4  # Updated to v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      run: |
        # Check if any test files exist
        if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
          pytest
        else
          echo "No test files found. This step will be marked as successful but no tests ran."
          echo "To add tests, create files named test_*.py or *_test.py"
        fi
      continue-on-error: false  # Set to true if you don't want failures to stop the workflow
